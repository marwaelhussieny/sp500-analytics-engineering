name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dbt-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt_project
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dbt
        run: pip install dbt-core==1.11.12 dbt-duckdb==1.10.1

      - name: dbt seed
        env:
          DBT_PROFILES_DIR: .
        run: dbt seed

      - name: dbt run
        env:
          DBT_PROFILES_DIR: .
        run: dbt run

      - name: dbt test
        env:
          DBT_PROFILES_DIR: .
        run: dbt test

      - name: Upload built DuckDB file for the Evidence job
        uses: actions/upload-artifact@v4
        with:
          name: sp500-duckdb
          path: dbt_project/sp500.duckdb

  evidence-build:
    runs-on: ubuntu-latest
    needs: dbt-build
    defaults:
      run:
        working-directory: evidence
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download built DuckDB file from dbt job
        uses: actions/download-artifact@v4
        with:
          name: sp500-duckdb
          path: evidence/sources/sp500

      - name: Install Evidence
        run: npm install --legacy-peer-deps

      - name: Build Evidence site
        run: npm run sources && npm run build
